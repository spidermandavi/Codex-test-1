<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Trainer Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-nav" aria-label="Primary navigation">
      <nav class="top-nav__controls" aria-label="Browser controls">
        <a class="top-nav__button" href="index.html">Home</a>
        <button class="top-nav__button" type="button" data-history="back" aria-label="Go back">&lt;</button>
        <button class="top-nav__button" type="button" data-history="forward" aria-label="Go forward">&gt;</button>
      </nav>
    </header>

    <main class="home-shell" aria-labelledby="home-title">
      <section class="hero-card">
        <div class="ambient ambient-one"></div>
        <div class="ambient ambient-two"></div>
        <div class="ambient ambient-three"></div>

        <div class="hero-content">
          <p class="eyebrow">Grandmaster-ready study hub</p>
          <h1 id="home-title">Train sharper. Survive longer. Win cleaner.</h1>
          <p class="intro">
            Choose a focused training mode and keep momentum with a polished,
            responsive dashboard built for fast chess improvement.
          </p>
        </div>

        <div class="menu-launcher">
          <button
            id="menu-toggle"
            class="menu-toggle"
            type="button"
            aria-expanded="true"
            aria-controls="training-menu"
          >
            <span class="menu-toggle__orb" aria-hidden="true"></span>
            <span>Training Menu</span>
            <span class="menu-toggle__chevron" aria-hidden="true">⌄</span>
          </button>
        </div>

        <nav id="training-menu" class="mode-menu is-open" aria-label="Training mode menu">
          <button class="mode-card repertoire" type="button">
            <span class="mode-icon" aria-hidden="true">♞</span>
            <span>
              <strong>Repertoire Training</strong>
              <small>Drill openings by line, plan, and key position.</small>
            </span>
          </button>
          <button class="mode-card survival" type="button">
            <span class="mode-icon" aria-hidden="true">♜</span>
            <span>
              <strong>Survival</strong>
              <small>Keep solving until the streak finally breaks.</small>
            </span>
          </button>
          <button class="mode-card timed" type="button">
            <span class="mode-icon" aria-hidden="true">⏱</span>
            <span>
              <strong>Timed</strong>
              <small>Race the clock with high-pressure tactical sets.</small>
            </span>
          </button>
          <button class="mode-card chapter" type="button">
            <span class="mode-icon" aria-hidden="true">♛</span>
            <span>
              <strong>Chapter</strong>
              <small>Progress through curated lessons and milestones.</small>
            </span>
          </button>
          <button class="mode-card weakness" type="button">
            <span class="mode-icon" aria-hidden="true">◎</span>
            <span>
              <strong>Weakness</strong>
              <small>Target recurring mistakes with adaptive review.</small>
            </span>
          </button>
          <button class="mode-card flashcards" type="button">
            <span class="mode-icon" aria-hidden="true">✦</span>
            <span>
              <strong>Flashcards</strong>
              <small>Memorize motifs, endgames, and repertoire notes.</small>
            </span>
          </button>
          <a class="mode-card converter" href="study-converter.html">
            <span class="mode-icon" aria-hidden="true">{ }</span>
            <span>
              <strong>Study JSON Converter</strong>
              <small>Turn a Lichess study link or PGN into copyable repertoire JSON.</small>
            </span>
          </a>
        </nav>
      </section>
    </main>

    <script src="nav.js"></script>
    <script src="script.js"></script>
  </body>
</html>
